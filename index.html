/* BOTÃO FLUTUANTE TOP */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 70px;
    height: 70px;
    background: #25D366;
    color: white;
    border-radius: 50%;
    font-size: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    z-index: 999;

    animation: pulsar 1.5s infinite;
}

/* EFEITO DE ONDA (PROFISSIONAL) */
.whatsapp-float::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #25D366;
    opacity: 0.5;
    animation: onda 1.5s infinite;
}

/* ANIMAÇÃO PRINCIPAL */
@keyframes pulsar {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* ANIMAÇÃO DA ONDA */
@keyframes onda {
  0% {
    transform: scale(1);
    opacity: 0.5;
  }
  100% {
    transform: scale(1.8);
    opacity: 0;
  }
}
