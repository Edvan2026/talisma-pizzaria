<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TALISMÃ PIZZARIA</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    text-align: center;
    background: #f2f2f2;
}

header {
    background: #0d3b66;
    color: white;
    padding: 25px 20px;
}

.container {
    padding: 20px;
}

.botao {
    display: block;
    background: #25D366;
    color: white;
    padding: 20px;
    margin: 15px auto;
    width: 90%;
    max-width: 350px;
    font-size: 20px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
}

.botao-ligar {
    display: block;
    background: #0984e3;
    color: white;
    padding: 16px;
    margin: 10px auto;
    width: 90%;
    max-width: 350px;
    font-size: 16px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}

/* BOTÃO FLUTUANTE */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 65px;
    height: 65px;
    background: #25D366;
    color: white;
    border-radius: 50%;
    font-size: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.15);}
    100% {transform: scale(1);}
}

/* PROMOÇÃO */
.promo {
    background: #d62828;
    color: #ffd60a;
    padding: 25px;
    margin: 25px auto;
    max-width: 400px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

.promo h2 {
    margin-bottom: 10px;
}

#digitando {
    font-size: 18px;
    font-weight: bold;
    min-height: 30px;
}

/* FIXO ABAIXO */
.pizza {
    font-size: 18px;
    font-weight: bold;
    margin-top: 15px;
    color: #fff;
}
</style>
</head>

<body>

<header>
    <h1>TALISMÃ PIZZARIA</h1>
    <p>🔥 Entrega rápida • Pizza quentinha</p>
</header>

<div class="container">

<h2>🍕 Peça agora pelo WhatsApp</h2>

<a class="botao" href="https://wa.me/553438211320" target="_blank">
📲 PEDIR NO WHATSAPP
</a>

<a class="botao-ligar" href="tel:+553438211320">
📞 LIGAR AGORA
</a>

<!-- PROMOÇÃO -->
<div class="promo">
    <h2>🔥 PROMOÇÃO DO DIA</h2>

    <div id="digitando"></div>

    <!-- FIXO -->
    <div class="pizza">
        🍕 Calabresa Grande — R$49,90<br><br>
        🍕 Frango com Catupiry — R$67,90
    </div>
</div>

</div>

<!-- BOTÃO FLUTUANTE -->
<a class="whatsapp-float" href="https://wa.me/553438211320" target="_blank">
💬
</a>

<script>
const texto = "🔥 Hoje tem promoção especial saindo do forno...";
let i = 0;

function digitar() {
    document.getElementById("digitando").innerHTML = "";

    let intervalo = setInterval(() => {
        if (i < texto.length) {
            document.getElementById("digitando").innerHTML += texto.charAt(i);
            i++;
        } else {
            clearInterval(intervalo);
            i = 0;
            setTimeout(digitar, 1200); // reinicia depois de pausa
        }
    }, 80);
}

digitar();
</script>

</body>
</html>
